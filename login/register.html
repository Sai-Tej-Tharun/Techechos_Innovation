<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — TechEchos Innovation</title>

  <meta name="description" content="Create your TechEchos account to manage projects, invoices and support.">
  <meta name="author" content="TechEchos Innovation">

  <link rel="icon" type="image/svg+xml" href="../global-images/logo.svg">

  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="../global-css/global.css">
  <link rel="stylesheet" href="login.css">
</head>

<body class="ln-body">

  
  <div class="ln-scene" aria-hidden="true">
    <canvas id="ln-sky" class="ln-canvas ln-sky-canvas"></canvas>
    <canvas id="ln-stars" class="ln-canvas ln-star-canvas"></canvas>
    <div class="ln-lantern-field"></div>

    <svg class="ln-hills" viewBox="0 0 1440 340" preserveAspectRatio="none">
      <path class="ln-hill-back" d="M0 280 C120 180,280 240,440 190 C600 140,720 220,900 170 C1080 120,1220 210,1440 180 L1440 340 L0 340 Z"/>
      <path class="ln-hill-mid" d="M0 310 C100 240,260 290,420 265 C580 240,700 300,880 270 C1060 240,1240 300,1440 275 L1440 340 L0 340 Z"/>
      <path class="ln-hill-front" d="M0 330 C80 300,200 320,360 310 C520 300,680 330,840 315 C1000 300,1180 330,1440 318 L1440 340 L0 340 Z"/>
    </svg>

    <div class="ln-orb ln-orb-purple"></div>
    <div class="ln-orb ln-orb-orange"></div>
    <div class="ln-orb ln-orb-pink"></div>
  </div>

  
  <main class="ln-main">

    
    <nav class="ln-nav">
      <a href="../home-1/home.html" class="ln-brand">
        <img src="../images/logo.svg" class="ln-brand-logo">
        <span class="ln-brand-name">
          TechEchos <span class="ln-brand-accent">Innovation</span>
        </span>
      </a>

      <a href="../home-1/home.html" class="ln-back-link">
        ← Back to site
      </a>
    </nav>

    
    <div class="ln-stage">
      <div class="ln-card">

        
        <div class="ln-bulb-wrap">
          <img src="../images/logo.svg" class="ln-bulb-img">
        </div>

        
        <div class="ln-card-header">
          <h1 class="ln-card-title">Create your account</h1>
          <p class="ln-card-sub">Start your journey with TechEchos</p>
        </div>

        
        <form class="ln-form" id="ln-register-form" novalidate>

          <div class="ln-two-col">
            <div class="ln-field">
              <label class="ln-label">First name</label>
              <input class="ln-input" type="text" required>
            </div>

            <div class="ln-field">
              <label class="ln-label">Last name</label>
              <input class="ln-input" type="text" required>
            </div>
          </div>

          <div class="ln-field">
            <label class="ln-label">Email</label>
            <input class="ln-input" type="email" required>
          </div>



          <div class="ln-field">
            <label class="ln-label">Password</label>
            <input class="ln-input" type="password" required>

            
            <div class="ln-strength">
              <div class="ln-strength-track">
                <div class="ln-strength-fill"></div>
              </div>
              <span class="ln-strength-label"></span>
            </div>
          </div>

          <label class="ln-check-label">
            <input type="checkbox" required>
            I agree to Terms & Privacy
          </label>

          <button type="submit" class="ln-submit-btn">
            Create Account
          </button>

          
          <div class="ln-or"><span></span><em>or</em><span></span></div>

          <div class="ln-socials">
            <button type="button" class="ln-social-btn">Google</button>
            <button type="button" class="ln-social-btn">GitHub</button>
          </div>

          
          <p class="ln-switch-text">
            Already have an account?
            <a href="login.html" class="ln-switch-btn">Sign in</a>
          </p>

        </form>

      </div>
    </div>

  </main>

  
  <script src="../global-js/global.js"></script>
  <script src="login.js"></script>
  <script src="../global-js/particles.js"></script>

</body>
</html>
